<!DOCTYPE html>
<html lang="ja" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3955d6" />
    <title>TapLog — 製造日報</title>

    <!-- Fonts: Inter (UI) + Roboto Mono (clocks) + Noto Sans JP (日本語) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Material Symbols (Material Design icons) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
    />

    <link rel="stylesheet" href="./css/tokens.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/worker.css" />
    <link rel="stylesheet" href="./css/admin.css" />

    <!-- QR decode library (vendored, offline-capable). Exposes window.jsQR. -->
    <script src="./js/vendor/jsQR.js" defer></script>
  </head>
  <body>
    <div id="app">
      <noscript>TapLog はJavaScriptを有効にしてご利用ください。</noscript>
    </div>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
